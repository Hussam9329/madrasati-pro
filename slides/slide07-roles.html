<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"></head>
<body style="width:720pt;height:405pt;margin:0;padding:0;overflow:hidden;background-image:url('assets/dark-accent-bg.png');background-size:cover;font-family:'Arial','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;">
  <div style="padding:24pt 48pt 8pt 48pt;">

        <p style="font-size:13pt;font-weight:bold;color:#DCBD74;margin:0 0 3pt 0;line-height:1.2;">موظف التسجيل</p>
        <p style="font-size:11pt;color:rgba(255,255,255,0.7);margin:0;line-height:1.3;">إضافة وتعديل الطلاب</p>

      <div style="width:148pt;background:rgba(255,255,255,0.08);border:1pt solid rgba(255,255,255,0.15);border-radius:8pt;padding:14pt 12pt;display:flex;flex-direction:column;align-items:center;text-align:center;">

</html>
