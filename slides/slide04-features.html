<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"></head>
<body style="width:720pt;height:405pt;margin:0;padding:0;overflow:hidden;background-color:#EEF7F1;font-family:'Arial','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;">
  <div style="padding:28pt 48pt 12pt 48pt;">
    <h2 style="font-size:26pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.2;">المميزات الرئيسية</h2>
    <div style="width:40pt;height:3pt;background:#DCBD74;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 48pt;">
    <!-- Row 1 -->
    <div style="display:flex;gap:16pt;margin-bottom:16pt;">
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-student.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">إدارة الطلاب</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">ملف شامل لكل طالب مع QR</p>
      </div>
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-teacher.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">إدارة المدرسين</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">ربط المدرسين بالمواد والصفوف</p>
      </div>
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-subject.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">إدارة المواد</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">7 مواد أساسية مع توزيع درجات</p>
      </div>
    </div>
    <!-- Row 2 -->
    <div style="display:flex;gap:16pt;">
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-qr.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">حضور QR</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">تسجيل دخول وخروج آلي بالمسح</p>
      </div>
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-report.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">التقارير</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">تقارير حضور ودرجات ونسب نجاح</p>
      </div>
      <div style="width:192pt;background:#FFFFFF;border-radius:10pt;padding:18pt 16pt;box-shadow:0 2pt 8pt rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:flex-start;">
        <div style="width:40pt;height:40pt;border-radius:10pt;background:#D8EEE2;display:flex;align-items:center;justify-content:center;margin-bottom:10pt;">
          <img src="assets/icon-lock.png" style="width:36pt;height:36pt;">
        </div>
        <p style="font-size:15pt;font-weight:bold;color:#1B4332;margin:0 0 4pt 0;line-height:1.3;">الصلاحيات</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.5;">8 مستويات صلاحية مختلفة</p>
      </div>
    </div>
  </div>

</html>
