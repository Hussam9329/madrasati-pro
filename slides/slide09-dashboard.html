<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"></head>
<body style="width:720pt;height:405pt;margin:0;padding:0;overflow:hidden;background-color:#EEF7F1;font-family:'Arial','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;">
  <div style="height:56pt;background:#122D1F;display:flex;align-items:center;padding:0 48pt;box-sizing:border-box;">
    <h2 style="font-size:22pt;font-weight:bold;color:#FFFFFF;margin:0;line-height:1.25;">لوحة التحكم</h2>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:20pt 48pt;box-sizing:border-box;">
    <!-- KPI Row -->
    <div style="display:flex;gap:12pt;margin-bottom:16pt;">
      <div style="width:192pt;flex-shrink:0;background:#FFFFFF;border-radius:10pt;padding:20pt 16pt;text-align:center;box-shadow:0 2pt 6pt rgba(0,0,0,0.06);box-sizing:border-box;">
        <p style="font-size:32pt;font-weight:bold;color:#DCBD74;margin:0 0 4pt 0;line-height:1;">1,250</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.4;">إجمالي الطلاب</p>
      </div>
      <div style="width:192pt;flex-shrink:0;background:#FFFFFF;border-radius:10pt;padding:20pt 16pt;text-align:center;box-shadow:0 2pt 6pt rgba(0,0,0,0.06);box-sizing:border-box;">
        <p style="font-size:32pt;font-weight:bold;color:#DCBD74;margin:0 0 4pt 0;line-height:1;">96%</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.4;">نسبة الحضور</p>
      </div>
      <div style="width:192pt;flex-shrink:0;background:#FFFFFF;border-radius:10pt;padding:20pt 16pt;text-align:center;box-shadow:0 2pt 6pt rgba(0,0,0,0.06);box-sizing:border-box;">
        <p style="font-size:32pt;font-weight:bold;color:#DCBD74;margin:0 0 4pt 0;line-height:1;">87%</p>
        <p style="font-size:12pt;color:#2E6B4F;margin:0;line-height:1.4;">نسبة النجاح</p>
      </div>
    </div>
    <!-- Feature cards -->
    <div style="display:flex;gap:10pt;">
      <div style="width:134pt;flex-shrink:0;border:1.5pt solid #A8D4BC;border-radius:10pt;padding:14pt 10pt;box-sizing:border-box;">
        <div style="width:3pt;height:20pt;background:#DCBD74;border-radius:2pt;margin:0 0 6pt auto;"></div>
        <p style="font-size:12pt;font-weight:bold;color:#1B4332;margin:0 0 3pt 0;line-height:1.3;text-align:right;">آخر الحضور</p>
        <p style="font-size:11pt;color:#2E6B4F;margin:0;line-height:1.3;text-align:right;">عمليات الحضور الأخيرة لحظياً</p>
      </div>
      <div style="width:134pt;flex-shrink:0;border:1.5pt solid #A8D4BC;border-radius:10pt;padding:14pt 10pt;box-sizing:border-box;">
        <div style="width:3pt;height:20pt;background:#7EC8B0;border-radius:2pt;margin:0 0 6pt auto;"></div>
        <p style="font-size:12pt;font-weight:bold;color:#1B4332;margin:0 0 3pt 0;line-height:1.3;text-align:right;">إكمال الدرجات</p>
        <p style="font-size:11pt;color:#2E6B4F;margin:0;line-height:1.3;text-align:right;">نسب إدخال الدرجات لكل مادة</p>
      </div>
      <div style="width:134pt;flex-shrink:0;border:1.5pt solid #A8D4BC;border-radius:10pt;padding:14pt 10pt;box-sizing:border-box;">
        <div style="width:3pt;height:20pt;background:#E18C70;border-radius:2pt;margin:0 0 6pt auto;"></div>
        <p style="font-size:12pt;font-weight:bold;color:#1B4332;margin:0 0 3pt 0;line-height:1.3;text-align:right;">الإشعارات</p>
        <p style="font-size:11pt;color:#2E6B4F;margin:0;line-height:1.3;text-align:right;">تنبيهات فورية للمستخدمين</p>
      </div>
      <div style="width:134pt;flex-shrink:0;border:1.5pt solid #A8D4BC;border-radius:10pt;padding:14pt 10pt;box-sizing:border-box;">
        <div style="width:3pt;height:20pt;background:#2E6B4F;border-radius:2pt;margin:0 0 6pt auto;"></div>
        <p style="font-size:12pt;font-weight:bold;color:#1B4332;margin:0 0 3pt 0;line-height:1.3;text-align:right;">رسوم بيانية</p>
        <p style="font-size:11pt;color:#2E6B4F;margin:0;line-height:1.3;text-align:right;">رسوم تفاعلية للتحليل</p>
      </div>
    </div>
  </div>
</body>
</html>
