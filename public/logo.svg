<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer circle frame -->
  <circle cx="60" cy="60" r="56" stroke="#b01849" stroke-width="3" fill="#fff7f9"/>
  <circle cx="60" cy="60" r="50" stroke="#f4cdd8" stroke-width="1.5" fill="white"/>

  <!-- Graduation cap -->
  <polygon points="60,28 90,44 60,54 30,44" fill="#b01849"/>
  <polygon points="60,28 90,44 60,54 30,44" fill="url(#capGrad)"/>

  <!-- Cap band -->
  <rect x="34" y="44" width="52" height="4" rx="1" fill="#8f153b" opacity="0.3"/>

  <!-- Tassel -->
  <line x1="88" y1="44" x2="88" y2="64" stroke="#d9a15f" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="84,64 92,64 90,72 86,72" fill="#d9a15f"/>

  <!-- Book -->
  <rect x="38" y="62" width="44" height="28" rx="4" fill="#fff0f4" stroke="#b01849" stroke-width="1.5"/>
  <line x1="60" y1="64" x2="60" y2="88" stroke="#f4cdd8" stroke-width="1"/>
  <rect x="42" y="66" width="14" height="2" rx="1" fill="#d9a15f" opacity="0.6"/>
  <rect x="42" y="72" width="12" height="2" rx="1" fill="#b01849" opacity="0.3"/>
  <rect x="42" y="78" width="10" height="2" rx="1" fill="#b01849" opacity="0.2"/>
  <rect x="64" y="66" width="14" height="2" rx="1" fill="#d9a15f" opacity="0.6"/>
  <rect x="64" y="72" width="12" height="2" rx="1" fill="#b01849" opacity="0.3"/>
  <rect x="64" y="78" width="10" height="2" rx="1" fill="#b01849" opacity="0.2"/>

  <!-- Gold accent star -->
  <circle cx="60" cy="54" r="2" fill="#d9a15f"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="capGrad" x1="30" y1="28" x2="90" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b01849"/>
      <stop offset="100%" stop-color="#8f153b"/>
    </linearGradient>
  </defs>
</svg>
